<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f7fa;

    }
    .wrap {
      max-width: 760px;
      margin: 60px auto;
      background: white;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);

    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;

    .btn {
      display: inline-block;

      font-weight: bold;
    }
    .btn:hover {
      opacity: 0.92;

  <div class="wrap">
    <h1>London Advanced Tuberculosis Course</h1>
    <p>

    <p class="small">
